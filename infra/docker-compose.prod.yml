# ═══════════════════════════════════════════════════════════════════════════════
# AMS 운영 환경 Docker Compose
# 대상: Synology NAS (192.168.0.22) — Portainer Stack
#
# 사용법:
#   1. cp infra/.env.prod.example infra/.env.prod
#   2. infra/.env.prod 에서 패스워드 등 변경
#   3. Portainer > Stacks > Add Stack > 이 파일 업로드
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL 15 ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ams-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ams_db}
      POSTGRES_USER: ${POSTGRES_USER:-ams}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      # NAS 로컬 경로 마운트 (데이터 영속성)
      - /volume1/docker/portainer/ams/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ams} -d ${POSTGRES_DB:-ams_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ams-net

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GHCR_USERNAME:-jaeilpark82}/${GHCR_REPO:-ams}-backend:latest
    container_name: ams-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FRONTEND_URL: ${FRONTEND_URL:-http://192.168.0.22}
      DELL_API_CLIENT_ID: ${DELL_API_CLIENT_ID:-}
      DELL_API_CLIENT_SECRET: ${DELL_API_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ams-net

  # ─── Vue3 Frontend (nginx + 정적파일 + API 프록시) ────────────────────────────
  frontend:
    image: ghcr.io/${GHCR_USERNAME:-jaeilpark82}/${GHCR_REPO:-ams}-frontend:latest
    container_name: ams-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ams-net

networks:
  ams-net:
    driver: bridge
    name: ams-network
